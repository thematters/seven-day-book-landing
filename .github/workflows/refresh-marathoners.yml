name: Marathoners sanity-check (GraphQL)

# ⚠️ 注意：實測 Matters public GraphQL 會嚴重低估大滿貫次數
# （5-25 期算出 276 vs observablehq DB ground truth 673，落差 397）。
# 原因：GraphQL 不會列出被作者隱藏 / 撤回 / 刪除的文章。
#
# 真正的 ground truth：`scripts/import-awards.mjs` 從 observablehq notebook
# 匯出的兩個 JSON 載入：
#   - research/freewrite-grand-slams-observablehq.json (大滿貫 history)
#   - research/freewrite-participation-awards-observablehq.json (參加獎 history)
# 兩個 JSON 由人手動每月從 observablehq 兩個 notebook 重新匯出。
#
# 本 workflow 保留為「sanity-check」用途：每月跑 GraphQL dry-run，
# 比對跟 marathoners.ts 內 totalGrandSlams 落差是否合理，
# 若 GraphQL 數字 < ground truth 30% 觸發 warning，提示該重跑 observablehq。

on:
  schedule:
    - cron: "0 1 1 * *" # 每月一日 UTC 01:00 (台北 09:00)
  workflow_dispatch:

jobs:
  sanity_check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Run GraphQL stats (dry-run, no commit)
        run: |
          node scripts/refresh-marathoners.mjs 2>&1 | tee /tmp/graphql-stats.txt
          GRAPHQL_GRAND=$(grep "總大滿貫次數" /tmp/graphql-stats.txt | head -1 | grep -oE '[0-9]+' | head -1)
          GROUND_TRUTH=$(grep -oE 'totalGrandSlams = [0-9]+' src/data/freewrite-marathoners.ts | grep -oE '[0-9]+')
          echo "GraphQL 算出: $GRAPHQL_GRAND"
          echo "Ground truth (observablehq import): $GROUND_TRUTH"
          # GraphQL 永遠會比 ground truth 低（因為看不到隱藏文）；
          # 但如果 GraphQL < ground truth × 30%，可能 GraphQL 整個壞掉
          THRESHOLD=$((GROUND_TRUTH * 30 / 100))
          if [ "$GRAPHQL_GRAND" -lt "$THRESHOLD" ]; then
            echo "::warning::GraphQL 大滿貫數字 $GRAPHQL_GRAND 顯著低於下限 $THRESHOLD（30% of $GROUND_TRUTH）— 可能 GraphQL 出問題，或 observablehq ground truth 已過時"
          fi
          # 提示：如果新一期 campaign 結束，記得 重跑 observablehq notebook
          # 並把 history table 匯出 JSON 覆蓋 research/freewrite-grand-slams-observablehq.json
